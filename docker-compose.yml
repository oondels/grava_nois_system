services:
  grava_nois_system:
    build: .
    container_name: grava_nois_system
    restart: unless-stopped
    stdin_open: true # Matém o stdin aberto para receber input (Enter)
    tty: true
    env_file:
      - .env
    working_dir: /usr/src/app
    shm_size: 512m

    # Health check: verifica se FFmpeg está rodando corretamente
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f ffmpeg || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Aguarda 60s antes de começar health checks (tempo para câmera inicializar)

    volumes:
      - ./.env:/usr/src/app/.env:ro
      - ./files:/usr/src/app/files
      - ./recorded_clips:/usr/src/app/recorded_clips
      - ./queue_raw:/usr/src/app/queue_raw
      - ./failed_clips:/usr/src/app/failed_clips
      - ./logs:/usr/src/app/logs  # Diretório para logs

    # Network defaults to bridge, which is fine for RTSP on LAN.
    # For GPIO or V4L2 webcam usage, uncomment the lines below:
    devices:
      - "/dev/video0:/dev/video0" # camera local notebook
      # - "/dev/serial/by-id/usb-Raspberry_Pi_Pico_XXXXXXXXXXXXXXXX-if00:/dev/serial/by-id/usb-Raspberry_Pi_Pico_XXXXXXXXXXXXXXXX-if00" # Pico USB serial estavel (recomendado)
    privileged: true # needed to access GPIO or /dev/video*
    network_mode: host # if pigpio daemon runs on host or strict LAN access is needed
