CLAUDE_CMD="claude"

# Se o seu CLI aceita o prompt como argumento final, deixe como "arg".
# Se ele lê da entrada padrão (stdin), use "stdin".
CLAUDE_INPUT_MODE="arg"

# Flags extras do seu CLI.
# Exemplos:
#   Claude Code/CLI que usa modo print: CLAUDE_ARGS=(-p)
#   Selecionar modelo: CLAUDE_ARGS=(--model claude-sonnet-4-5 -p)
CLAUDE_ARGS=(-p)

# Diretório do projeto onde o agente deve atuar.
LOOP_WORKDIR="/home/oendel/code/hendrius/grava_nois_system"

# Máximo de repetições do loop.
LOOP_MAX_ITERATIONS=15

# Intervalo entre uma execução e outra (em segundos).
LOOP_SLEEP_SECONDS=8

# Arquivo de log.
LOOP_LOG_FILE="./ralhp_loop.log"

# O loop encerra quando o output casar com esse regex.
# Recomenda-se instruir o agente a responder com TASK_COMPLETE quando terminar.
LOOP_SUCCESS_PATTERN="TASK_COMPLETE|NO_CHANGES_NEEDED"
LOOP_STOP_ON_SUCCESS=1

# Prompt principal.
# Você também pode comentar esta variável e usar CLAUDE_PROMPT_FILE.
# CLAUDE_PROMPT=$'Você é um code agent executando em loop.\nAnalise o projeto atual, faça as alterações necessárias, valide o resultado e continue iterando até concluir.\nQuando terminar completamente, responda exatamente com: TASK_COMPLETE'

# Alternativa: usar um arquivo externo com o prompt.
# CLAUDE_PROMPT_FILE="./agent_prompt.md"

# Texto adicionado automaticamente a cada nova iteração.
LOOP_PROMPT_APPEND_ON_RETRY=$'Se ainda não terminou, continue de onde parou. Não reinicie a análise.'
