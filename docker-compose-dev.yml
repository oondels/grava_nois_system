services:
  grava_nois_system:
    build: .
    # image: ${GRAVA_NOIS_SYSTEM_IMAGE:-oondels/gravanois-system:latest}
    #pull_policy: always
    container_name: grava_nois_system
    restart: unless-stopped
    stdin_open: true # Mantém stdin aberto para trigger via Enter
    tty: true
    env_file:
      - .env
    environment:
      GN_CONFIG_PATH: /usr/src/app/runtime_config/config.json
      GN_HOST_ENV_PATH: /usr/src/app/host_config/.env
    working_dir: /usr/src/app
    shm_size: 512m

    # Health check: verifica se o processo principal Python está vivo
    # (câmeras podem estar em modo degradado sem derrubar o container)
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*main' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Aguarda o runtime inicializar antes de começar health checks

    volumes:
      - ./.env:/usr/src/app/.env:ro
      - .:/usr/src/app/host_config:rw  # Expõe diretório do host para leitura/escrita do .env via admin
      - ./runtime_config:/usr/src/app/runtime_config
      - ./files:/usr/src/app/files:ro
      - ./recorded_clips:/usr/src/app/recorded_clips
      - ./queue_raw:/usr/src/app/queue_raw
      - ./highlights_wm:/usr/src/app/highlights_wm
      - ./failed_clips:/usr/src/app/failed_clips
      - ./logs:/usr/src/app/logs  # Diretório para logs

    # Para RTSP remoto, host network costuma simplificar no edge.
    network_mode: host # if pigpio daemon runs on host or strict LAN access is needed

    # Acesso privilegiado necessário para múltiplos dispositivos seriais (Pico/botões)
    privileged: true
